<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIVĀRA × KRONOS — Exact PDF Deck</title>
  <style>
    :root {
      --bg: #050505;
      --ui: rgba(255,255,255,0.78);
      --ui-dim: rgba(255,255,255,0.34);
      --line: rgba(255,255,255,0.14);
      --shadow: rgba(0,0,0,0.55);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, Arial, sans-serif;
      color: white;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 22%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.03), transparent 20%);
      animation: ambient 14s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes ambient {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.03); opacity: 1; }
    }

    #deck {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 500ms ease;
      background: #000;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .page-wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #000;
    }

    .page-image {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      object-position: center center;
      image-rendering: auto;
      filter: drop-shadow(0 18px 60px var(--shadow));
      transform-origin: center center;
      will-change: transform;
    }

    .slide.active .page-image {
      animation: breathe 12s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.012); }
    }

    .hud {
      position: fixed;
      left: 24px;
      right: 24px;
      top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      pointer-events: none;
      mix-blend-mode: difference;
    }

    .brand, .counter {
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ui);
      text-shadow: 0 1px 8px rgba(0,0,0,0.35);
    }

    .controls {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 11;
      background: rgba(0,0,0,0.34);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 8px 12px;
    }

    .btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--ui);
      width: 36px;
      height: 36px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .btn:hover { background: rgba(255,255,255,0.08); }

    .dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--ui-dim);
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease;
    }

    .dot.active {
      background: var(--ui);
      transform: scale(1.28);
    }

    .help {
      position: fixed;
      right: 24px;
      bottom: 22px;
      z-index: 10;
      font-size: 11px;
      color: rgba(255,255,255,0.52);
      letter-spacing: 0.08em;
      mix-blend-mode: difference;
      pointer-events: none;
    }

    @media (max-width: 720px) {
      .brand, .counter, .help { font-size: 10px; letter-spacing: 0.22em; }
      .controls { bottom: 16px; padding: 6px 10px; }
      .btn { width: 34px; height: 34px; }
      .dot { width: 6px; height: 6px; }
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="brand">VIVĀRA × KRONOS</div>
    <div class="counter"><span id="current">01</span> / <span id="total">10</span></div>
  </div>

  <div id="deck">
    <section class="slide active"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-01.png" alt="Page 1" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-02.png" alt="Page 2" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-03.png" alt="Page 3" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-04.png" alt="Page 4" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-05.png" alt="Page 5" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-06.png" alt="Page 6" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-07.png" alt="Page 7" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-08.png" alt="Page 8" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-09.png" alt="Page 9" /></div></section>
    <section class="slide"><div class="page-wrap"><img class="page-image" src="vivara_kronos_assets/page-10.png" alt="Page 10" /></div></section>
  </div>

  <div class="controls">
    <button class="btn" id="prev" aria-label="Previous slide">←</button>
    <div class="dots" id="dots"></div>
    <button class="btn" id="next" aria-label="Next slide">→</button>
  </div>

  <div class="help">Arrow keys • click dots • space advances</div>

  <script>
    const slides = Array.from(document.querySelectorAll('.slide'));
    const currentEl = document.getElementById('current');
    const totalEl = document.getElementById('total');
    const dotsWrap = document.getElementById('dots');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    let index = 0;

    totalEl.textContent = String(slides.length).padStart(2, '0');

    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
      dot.addEventListener('click', () => goTo(i));
      dotsWrap.appendChild(dot);
    });

    const dots = Array.from(document.querySelectorAll('.dot'));

    function goTo(i) {
      index = (i + slides.length) % slides.length;
      slides.forEach((slide, s) => slide.classList.toggle('active', s === index));
      dots.forEach((dot, d) => dot.classList.toggle('active', d === index));
      currentEl.textContent = String(index + 1).padStart(2, '0');
    }

    prev.addEventListener('click', () => goTo(index - 1));
    next.addEventListener('click', () => goTo(index + 1));

    window.addEventListener('keydown', (e) => {
      if (['ArrowRight', 'PageDown', ' '].includes(e.key)) {
        e.preventDefault();
        goTo(index + 1);
      }
      if (['ArrowLeft', 'PageUp'].includes(e.key)) {
        e.preventDefault();
        goTo(index - 1);
      }
      if (e.key === 'Home') goTo(0);
      if (e.key === 'End') goTo(slides.length - 1);
    });
  </script>
</body>
</html>
